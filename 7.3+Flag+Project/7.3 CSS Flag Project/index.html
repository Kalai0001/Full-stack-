<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    .flag{
      border: 2px solid black;
      height: 600px;
      width: 900px;
      background-color: red;
      text-align: center;
      color: white;
      font-size: 50px;
    }
    .flag > div{
      text-align: center;
      background-color: blue;
      height: 300px;
      width: 900px;
      font-size: 50px;
      position: absolute;
      top: 150px;
    }
    .flag >div >div{
      background-color: white;
      height: 200px;
      width: 200px;
      border-radius: 50%;
      position: relative;
      /* margin-left: 40%; */
      top: 50px;
      left: 350px;
    }
    .flag >div >div p{
      color: black;
    }
    p {
      top: 50%;
      font-size: 5rem;
      color: white;
      text-align: center;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
